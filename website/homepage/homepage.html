<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinecraftHub - G-Georgiev14</title>
    <link rel="stylesheet" href="homepage.css">
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="minecraft-container">
        <!-- Header Navigation -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <img src="../images/GITBUILD.png" alt="GITBUILD" class="logo-image">
                </div>
                <nav class="main-nav">
                    <a href="#" class="nav-item active" data-section="overview">
                        <i class="fas fa-home"></i>
                        <span>Overview</span>
                    </a>
                    <a href="#" class="nav-item" data-section="repositories">
                        <i class="fas fa-code-branch"></i>
                        <span>Repositories</span>
                    </a>
                    <a href="#" class="nav-item" data-section="projects">
                        <i class="fas fa-cube"></i>
                        <span>Projects</span>
                    </a>
                    <a href="#" class="nav-item" data-section="packages">
                        <i class="fas fa-box"></i>
                        <span>Packages</span>
                    </a>
                    <a href="#" class="nav-item" data-section="stars">
                        <i class="fas fa-star"></i>
                        <span>Stars</span>
                    </a>
                </nav>
                <div class="header-actions">
                    <button class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                    <button class="new-repo-btn">
                        <i class="fas fa-plus"></i>
                        <span>New repository</span>
                    </button>
                    <div class="profile-menu">
                        <img src="https://picsum.photos/seed/minecraft/32/32.jpg" alt="Profile" class="profile-avatar">
                        <span class="dropdown-arrow">▼</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Main Content Area -->
            <main class="content-area">
                <!-- Popular Repositories -->
                <section class="repositories-section">
                    <div class="section-header">
                        <div class="section-title">
                            <h2>
                            
                            </h2>
                            <span class="repo-count"></span>
                        </div>
                        <div class="section-actions">
                    </div>
                    
                    <div class="repositories-grid" id="repositoriesGrid">
                        <!-- Repositories will be loaded here dynamically -->
                    </div>
                </section>

                <!-- Activity Section -->
               

                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <h3>No repositories yet</h3>
                    <p>Create your first repository to start sharing your Minecraft builds!</p>
                    <button class="create-repo-btn">
                        <i class="fas fa-plus"></i>
                        <span>Create repository</span>
                    </button>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Minecraft Sun -->
    <div class="sun">
        <div class="sun-rays"></div>
        <div class="sun-rays2"></div>
    </div>
    
    <script src="homepage.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
